settings:
  num_runs: 5 

molecules:
  names: ["H2"]
  basis_sets: ["sto-3g"]
  mappings: ["jordan_wigner", "bravyi_kitaev"]

ansatz_types:
  hardware_efficient:
    layers: [1,2,3,4,5,6,7,8]
  uccsd:
    layers: [1]

optimizers:
  - type: "adam"
    lr: [0.1]  
    gradient_method: ["adjoint"]
  - type: "cobyla"
    lr: [0.1]  
    gradient_method: ["none"]

noise_models:
  - model: "none"          
    strengths: [0.0] 
  - model: "depolarizing"  
    strengths: ["low"] 
  - model: "amplitude_damping"
    strengths: ["low"] 
  - model: "phase_damping"
    strengths: ["low"] 
  - model: "thermal_relaxation"
    strengths: ["low"] 
